name: Generate SBOM

on:
  release:
    types: [ created ]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  generate-sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install Syft
        run: curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
      - name: Generate SBOMs
        run: syft . -o spdx-json > sbom.spdx.json
      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign SBOMs
        run: cosign sign-blob --yes --output-signature sbom.spdx.json.sig --output-certificate sbom.spdx.json.cert sbom.spdx.json
        shell: bash
      - name: Verify signed SBOMs
        run: |
          cosign verify-blob --certificate sbom.spdx.json.cert \
          --certificate-identity "https://github.com/drachenpapa/genderify/.github/workflows/generate-sbom.yml@refs/heads/main" \
          --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
          --signature sbom.spdx.json.sig \
          sbom.spdx.json
      - name: Upload as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sboms
          path: |
            sbom.spdx.json
            sbom.spdx.json.sig
            sbom.spdx.json.cert
      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          files: |
            sbom.spdx.json
            sbom.spdx.json.sig
            sbom.spdx.json.cert
