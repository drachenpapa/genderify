<!DOCTYPE html>
<html lang="de">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Genderify</title>
        <link rel="stylesheet" href="genderify.css" />
        <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    </head>

    <body>
        <p>
            Den zu prüfenden Text markieren und auf "🔍 Überprüfen" klicken.<br /><br />
            Anschließend werden verfügbare Alternativen oder die Option mit einem Genderzeichen angezeigt.
        </p>

        <div class="genderchar-container">
            <label for="genderChar">Genderzeichen:</label>
            <input type="text" class="genderchar-input" id="genderChar" value="*" maxlength="1" aria-describedby="genderCharDesc" />
            <span id="genderCharDesc" class="sr-only">Einzelnes Zeichen, das zwischen Grundform und -innen eingefügt wird.</span>
        </div>

        <div class="analyzis-container">
            <button class="analyze-button" id="analyze-button">🔍 Überprüfen</button>
        </div>

        <p id="status-message" role="status" class="status-message"></p>

        <hr />

        <div class="finding-container" id="selection" aria-live="polite">
            <div class="variant-container" id="foundWordContainer">
                <label for="foundWord">Gefunden:</label>
                <input type="text" id="foundWord" readonly aria-label="Gefundenes Wort" />
            </div>

            <div class="variant-container" id="genderNeutralVariantContainer">
                <label for="genderNeutralWord">Alternative:</label>
                <select id="genderNeutralWord" disabled aria-label="Genderneutrale Alternative auswählen">
                </select>
                <button id="applyGenderNeutral" class="action-button" disabled aria-label="Genderneutrale Alternative übernehmen">✔️</button>
            </div>

            <div class="variant-container" id="genderedVariantContainer">
                <label for="genderedWord">Gegendert:</label>
                <input type="text" id="genderedWord" readonly aria-label="Gegenderte Form" />
                <button id="applyGendered" class="action-button" disabled aria-label="Gegenderte Form übernehmen">✔️</button>
            </div>

            <div class="navigation-buttons">
                <button id="prev-button" disabled aria-label="Vorheriges Wort">⬅️ Vorheriges</button>
                <span id="progress" class="progress-indicator" aria-live="polite"></span>
                <button id="next-button" disabled aria-label="Nächstes Wort">➡️ Nächstes</button>
            </div>
        </div>
    </body>
</html>
